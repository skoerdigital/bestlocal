<!DOCTYPE html>
<html lang="pl" data-type="serif">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, follow" />
<title>404 — nie znaleziono · BestLocal</title>
<meta name="theme-color" content="#16301F" />
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/fonts/fonts.css" />
<link rel="stylesheet" href="/css/styles.css" />

<link rel="stylesheet" href="/css/extra.css" />
<style>
.legal { width: min(760px, 100% - 40px); margin: 110px auto 80px; font-family: var(--font-body); }
  .legal h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(32px,5vw,48px); letter-spacing: -0.015em; line-height: 1.08; }
  .legal h2 { font-family: var(--font-display); font-weight: 600; font-size: clamp(20px,2.4vw,26px); margin-top: 38px; }
  .legal p, .legal li { color: var(--ink-soft); line-height: 1.7; }
  .legal ul { padding-left: 20px; list-style: disc; display: grid; gap: 8px; margin-top: 10px; }
  .legal .updated { color: var(--ink-faint); font-size: 14px; margin-top: 8px; }
  .legal .ph { background: var(--accent-soft); border-radius: 4px; padding: 0 4px; }
  .legal a { color: var(--accent); }
  .legal .note { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 16px 20px; margin-top: 24px; font-size: 14px; }
  .legal .back { display: inline-block; margin-top: 40px; color: var(--ink-soft); }
</style>
</head>
<body>
<main class="legal" style="text-align:center;margin-top:140px">
  <h1>Nie ma tu nic <span style="color:var(--accent)">do zobaczenia</span></h1>
  <p style="max-width:44ch;margin:14px auto 28px">Ta strona zgubiła się gdzieś na mapie. Wróćmy tam, gdzie wszystko działa.</p>
  <a class="btn btn-accent" href="/">← Wróć na stronę główną</a>
</main>
</body>
</html>
