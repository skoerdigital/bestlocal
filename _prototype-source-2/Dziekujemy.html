<!DOCTYPE html>
<html lang="pl" data-type="groteska">
<head>
  <meta charset="UTF-8"></meta>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
  <title>Dziękujemy — LocalExpert</title>
  <meta name="robots" content="noindex"></meta>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400..800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="lp/styles.css">
  <style>
    .ty-page { min-height: 100svh; display: grid; place-items: center; padding: 60px 24px; }
    .ty-card { max-width: 640px; width: 100%; }
    .ty-check {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--ok); color: #fff;
      display: grid; place-items: center; margin-bottom: 28px;
      animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .ty-h1 { font-size: clamp(34px, 5vw, 52px); margin-bottom: 16px; }
    .ty-inbox {
      display: flex; gap: 14px; align-items: flex-start;
      background: var(--paper); border: 1.5px solid var(--line);
      border-radius: var(--radius); padding: 20px 24px; margin: 28px 0 44px;
      font-size: 15px; line-height: 1.55; color: var(--ink-soft);
    }
    .ty-inbox strong { color: var(--ink); }
    .survey-q { margin-bottom: 34px; }
    .survey-label {
      font-family: var(--font-label); font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 14px;
    }
    .survey-title { font-weight: 800; font-size: 19px; margin-bottom: 16px; font-family: var(--font-display); letter-spacing: -0.015em; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      border: 1.5px solid var(--line); background: var(--paper);
      border-radius: 100px; padding: 11px 20px;
      font-size: 14.5px; font-weight: 600; color: var(--ink-soft);
      transition: all 0.22s cubic-bezier(0.34, 1.3, 0.64, 1);
    }
    .chip:hover { border-color: var(--accent); color: var(--ink); transform: translateY(-2px); }
    .chip.on {
      background: var(--ink); border-color: var(--ink); color: var(--bg);
      transform: scale(1.04);
    }
    .price-extra { margin-top: 14px; }
    .price-extra input {
      font-family: var(--font-body); font-size: 14.5px;
      padding: 11px 18px; border: 1.5px solid var(--line);
      border-radius: 100px; background: var(--paper); color: var(--ink);
      outline: none; width: 220px;
    }
    .price-extra input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .survey-done {
      background: var(--pine); color: var(--bone);
      border-radius: var(--radius); padding: 28px 30px;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 16px; line-height: 1.6;
    }
    .survey-done strong { color: var(--accent); }
    .ty-back { margin-top: 36px; font-size: 14px; }
    .ty-back a { color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const PRIORITIES = [
      'Gotowe odpowiedzi na opinie',
      'Więcej opinii od klientów',
      'Wiedza o konkurencji (skargi / ceny / ruch)',
      'Pilnowanie nieuczciwych wizytówek',
      'Sprawdzanie poleceń w ChatGPT',
    ];
    const PRICES = ['Tanio', 'W sam raz', 'Za drogo'];

    function ThankYou() {
      const [priority, setPriority] = React.useState(null);
      const [price, setPrice] = React.useState(null);
      const [own, setOwn] = React.useState('');
      const done = priority !== null && price !== null;

      return (
        <div className="ty-page">
          <div className="ty-card">
            <div className="ty-check">
              <svg width="30" height="30" viewBox="0 0 18 18" fill="none"><path d="M3.5 9.5l3.5 3.5 7.5-8" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"></path></svg>
            </div>
            <h1 className="display ty-h1">Jesteś na liście. Dziękujemy.</h1>
            <p className="lead">Jeszcze jeden krok — i dwie szybkie odpowiedzi, jeśli masz 20 sekund.</p>

            <div className="ty-inbox">
              <span style={{ fontSize: 22 }}>📬</span>
              <span><strong>Sprawdź skrzynkę i kliknij potwierdzenie.</strong> Bez tego nie możemy do Ciebie pisać — tak działa uczciwy zapis. Jeśli nic nie ma, zajrzyj do spamu.</span>
            </div>

            {!done ? (
              <React.Fragment>
                <div className="survey-q">
                  <span className="survey-label">Pytanie 1 / 2 · opcjonalne</span>
                  <div className="survey-title">Co chcesz dostać w pierwszej kolejności?</div>
                  <div className="chips">
                    {PRIORITIES.map((p, i) => (
                      <button key={i} className={`chip ${priority === i ? 'on' : ''}`} onClick={() => setPriority(i)}>{p}</button>
                    ))}
                  </div>
                </div>
                <div className="survey-q">
                  <span className="survey-label">Pytanie 2 / 2 · opcjonalne</span>
                  <div className="survey-title">99 zł miesięcznie za plan Start to:</div>
                  <div className="chips">
                    {PRICES.map((p, i) => (
                      <button key={i} className={`chip ${price === i ? 'on' : ''}`} onClick={() => setPrice(i)}>{p}</button>
                    ))}
                  </div>
                  {price === 2 ? (
                    <div className="price-extra">
                      <input type="text" placeholder="Ile byś zapłacił/a? (zł/mc)" value={own} onChange={(e) => setOwn(e.target.value)}></input>
                    </div>
                  ) : null}
                </div>
              </React.Fragment>
            ) : (
              <div className="survey-done">
                <strong>Dziękujemy — to naprawdę pomaga.</strong> Twoje odpowiedzi ustawiają kolejność tego, co budujemy. Odezwiemy się, gdy będzie co pokazać. Do usłyszenia!
              </div>
            )}

            <p className="ty-back"><a href="LocalExpert.html">← Wróć na stronę główną</a></p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ThankYou />);
  </script>
</body>
</html>
